<!--
  JellyRoll · Button — clean copy-paste snippet.
  Reusable CSS + canonical markup only (no gallery chrome). States are wired
  to real :hover / :active / :disabled (the live gallery demos them with
  .hover/.pressed classes instead). Full demo: /preview/components-buttons.html
  Requires the token CSS: https://sl-design-team.github.io/jellyroll/colors_and_type.css
-->
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  .sl-btn {
    font-family: var(--font-sans);
    font-weight: 800;
    border: 1.5px solid transparent;
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    gap: 8px;
    transition: background-color 150ms ease-out, color 150ms ease-out, border-color 150ms ease-out;
  }
  .sl-btn svg { width: 16px; height: 16px; stroke-width: 2; flex: none; }
  .sl-btn:disabled { cursor: not-allowed; }

  /* Sizes */
  .sl-btn--lg { font-size: 14px; line-height: 22px; padding: 8px 24px; }  /* 40px */
  .sl-btn--md { font-size: 14px; line-height: 22px; padding: 6px 18px; }  /* 36px */
  .sl-btn--sm { font-size: 12px; line-height: 16px; padding: 4px 12px; }  /* 28px */

  /* Primary — solid blue; hover is the teal→blue brand gradient (border-box
     so it fills the transparent border seamlessly); active = teal. */
  .sl-btn--primary { background: var(--sl-blue-600); color: var(--sl-white); }
  .sl-btn--primary:hover    { background: linear-gradient(112.63deg, #0B9D9B 12.38%, #0841B4 137.46%) border-box; }
  .sl-btn--primary:active   { background: var(--sl-teal-400); }
  .sl-btn--primary:disabled { background: var(--sl-blue-200); color: var(--sl-white); }

  /* Secondary — white with blue border; on hover border + text go teal. */
  .sl-btn--secondary { background: var(--sl-white); color: var(--sl-blue-600); border-color: var(--sl-blue-600); }
  .sl-btn--secondary:hover    { border-color: var(--sl-teal-600); color: var(--sl-teal-600); }
  .sl-btn--secondary:active   { background: var(--sl-teal-200); border-color: var(--sl-teal-400); color: var(--sl-teal-400); }
  .sl-btn--secondary:disabled { border-color: var(--sl-blue-200); color: var(--sl-blue-300); }

  /* Tertiary — text only, underline on hover. */
  .sl-btn--tertiary { background: transparent; color: var(--sl-blue-600); border: none; font-weight: 400; padding-left: 12px; padding-right: 12px; }
  .sl-btn--tertiary:hover    { color: var(--sl-teal-600); text-decoration: underline; }
  .sl-btn--tertiary:active   { color: var(--sl-teal-400); text-decoration: underline; }
  .sl-btn--tertiary:disabled { color: var(--sl-blue-300); }

  /* Icon-only — square at the size height; always needs aria-label. */
  .sl-btn--icon-only { padding: 0; gap: 0; }
  .sl-btn--icon-only.sl-btn--lg { width: 40px; height: 40px; }
  .sl-btn--icon-only.sl-btn--md { width: 36px; height: 36px; }
  .sl-btn--icon-only.sl-btn--sm { width: 28px; height: 28px; }

  /* Loading — spinner replaces the leading icon; keep full color, non-interactive. */
  .sl-btn--loading { cursor: progress; pointer-events: none; }
  .sl-spinner {
    --sl-spin-thick: 1px;
    width: 16px; height: 16px; border-radius: 50%; flex: none; color: currentColor;
    background: conic-gradient(from 0deg, transparent 0deg, currentColor 360deg);
    -webkit-mask: radial-gradient(circle, transparent calc(50% - var(--sl-spin-thick)), #000 calc(50% - var(--sl-spin-thick) + 0.5px));
            mask: radial-gradient(circle, transparent calc(50% - var(--sl-spin-thick)), #000 calc(50% - var(--sl-spin-thick) + 0.5px));
    animation: sl-spin 1.1s linear infinite;
  }
  @keyframes sl-spin { to { transform: rotate(360deg); } }
</style>

<!-- Markup -->
<button class="sl-btn sl-btn--lg sl-btn--primary">Continue</button>
<button class="sl-btn sl-btn--lg sl-btn--secondary">Cancel</button>
<button class="sl-btn sl-btn--lg sl-btn--tertiary">Learn more</button>

<!-- With a trailing Lucide icon -->
<button class="sl-btn sl-btn--lg sl-btn--primary">Continue<i data-lucide="arrow-right"></i></button>

<!-- Icon-only (square) — aria-label required -->
<button class="sl-btn sl-btn--lg sl-btn--primary sl-btn--icon-only" aria-label="Settings"><i data-lucide="settings"></i></button>

<!-- Loading -->
<button class="sl-btn sl-btn--lg sl-btn--primary sl-btn--loading" aria-busy="true"><span class="sl-spinner"></span>Saving…</button>

<!-- Disabled -->
<button class="sl-btn sl-btn--lg sl-btn--primary" disabled>Continue</button>
