<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Color · SL Red</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="card.css" />
</head>
<body>
  <div class="card">
    <div class="row-label">
      <span class="name">SL Red</span>
      <span class="meta">--sl-red-50 → --sl-red-1000 · default Red-600 #E31C3D</span>
    </div>
    <div class="swatch-row" style="grid-template-columns: repeat(11, 1fr);">
      <div class="swatch light" style="background:#FDF3F5"><div class="step">50</div><div class="hex">#FDF3F5</div></div>
      <div class="swatch light" style="background:#FCE8EC"><div class="step">100</div><div class="hex">#FCE8EC</div></div>
      <div class="swatch light" style="background:#F9D2D8"><div class="step">200</div><div class="hex">#F9D2D8</div></div>
      <div class="swatch light" style="background:#F4A4B1"><div class="step">300</div><div class="hex">#F4A4B1</div></div>
      <div class="swatch light" style="background:#EE778B"><div class="step">400</div><div class="hex">#EE778B</div></div>
      <div class="swatch dark" style="background:#E94964"><div class="step">500</div><div class="hex">#E94964</div></div>
      <div class="swatch dark" style="background:#E31C3D"><div class="step">600</div><div class="hex">#E31C3D</div></div>
      <div class="swatch dark" style="background:#B61631"><div class="step">700</div><div class="hex">#B61631</div></div>
      <div class="swatch dark" style="background:#881125"><div class="step">800</div><div class="hex">#881125</div></div>
      <div class="swatch dark" style="background:#5B0B18"><div class="step">900</div><div class="hex">#5B0B18</div></div>
      <div class="swatch dark" style="background:#2D060C"><div class="step">1000</div><div class="hex">#2D060C</div></div>
    </div>
  </div>
</body>
</html>
