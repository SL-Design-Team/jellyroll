<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Components · Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="card.css" />
<style>
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 14px; font-weight: 800; color: var(--sl-indigo-900); }
  .field .err { font-size: 12px; color: var(--color-text-alert); font-weight: 400; }
  .sl-input { font: var(--field-font); height: var(--field-height-md); padding: var(--field-padding-y-md) var(--field-padding-x); border-radius: var(--field-radius); border: 1px solid var(--field-border-default); background: var(--field-bg-default); color: var(--field-text-default); outline: none; }
  .sl-input::placeholder { font-style: italic; font-weight: 300; color: var(--field-text-placeholder); }
  .sl-input.hover { border-color: var(--field-border-hover); }
  .sl-input.focus { border-color: var(--field-border-focus); box-shadow: 0 0 0 2px rgba(9,129,127,0.18); }
  .sl-input.error { border-color: var(--field-border-error); background: var(--field-bg-error); }
  .sl-input.disabled { background: var(--field-bg-disabled); color: var(--field-text-disabled); border-color: var(--field-border-disabled); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 20px; }
</style>
</head>
<body>
  <div class="card">
    <div class="row-label"><span class="name">Inputs &amp; states</span><span class="meta">40px height · 12/8 padding</span></div>
    <div class="grid">
      <div class="field"><label>Default</label><input class="sl-input" value="Content goes here" /></div>
      <div class="field"><label>Hover</label><input class="sl-input hover" value="Content goes here" /></div>
      <div class="field"><label>Focus</label><input class="sl-input focus" value="Content goes here" /></div>
      <div class="field"><label>Placeholder</label><input class="sl-input" placeholder="dd/mm/yyyy" /></div>
      <div class="field"><label style="color: var(--color-text-alert)">Error</label><input class="sl-input error" value="Content goes here" /><span class="err">Error explanation goes here.</span></div>
      <div class="field"><label>Disabled</label><input class="sl-input disabled" value="Content goes here" disabled /></div>
    </div>
  </div>
</body>
</html>
