<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Color · SL Pink</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="card.css" />
</head>
<body>
  <div class="card">
    <div class="row-label">
      <span class="name">SL Pink</span>
      <span class="meta">--sl-pink-50 → --sl-pink-1000 · default Pink-600 #E31C73</span>
    </div>
    <div class="swatch-row" style="grid-template-columns: repeat(11, 1fr);">
      <div class="swatch light" style="background:#FDF3F8"><div class="step">50</div><div class="hex">#FDF3F8</div></div>
      <div class="swatch light" style="background:#FCE8F1"><div class="step">100</div><div class="hex">#FCE8F1</div></div>
      <div class="swatch light" style="background:#F9D2E3"><div class="step">200</div><div class="hex">#F9D2E3</div></div>
      <div class="swatch light" style="background:#F4A5C7"><div class="step">300</div><div class="hex">#F4A5C7</div></div>
      <div class="swatch light" style="background:#EE78AB"><div class="step">400</div><div class="hex">#EE78AB</div></div>
      <div class="swatch dark" style="background:#E94B8F"><div class="step">500</div><div class="hex">#E94B8F</div></div>
      <div class="swatch dark" style="background:#E31C73"><div class="step">600</div><div class="hex">#E31C73</div></div>
      <div class="swatch dark" style="background:#B6165C"><div class="step">700</div><div class="hex">#B6165C</div></div>
      <div class="swatch dark" style="background:#881145"><div class="step">800</div><div class="hex">#881145</div></div>
      <div class="swatch dark" style="background:#5B0B2E"><div class="step">900</div><div class="hex">#5B0B2E</div></div>
      <div class="swatch dark" style="background:#2D0617"><div class="step">1000</div><div class="hex">#2D0617</div></div>
    </div>
  </div>
</body>
</html>
