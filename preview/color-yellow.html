<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Color · SL Yellow</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="card.css" />
</head>
<body>
  <div class="card">
    <div class="row-label">
      <span class="name">SL Yellow</span>
      <span class="meta">--sl-yellow-50 → --sl-yellow-1000 · default Yellow-600 #FBBC04</span>
    </div>
    <div class="swatch-row" style="grid-template-columns: repeat(11, 1fr);">
      <div class="swatch light" style="background:#FFFBF2"><div class="step">50</div><div class="hex">#FFFBF2</div></div>
      <div class="swatch light" style="background:#FFF8E6"><div class="step">100</div><div class="hex">#FFF8E6</div></div>
      <div class="swatch light" style="background:#FEF2CD"><div class="step">200</div><div class="hex">#FEF2CD</div></div>
      <div class="swatch light" style="background:#FDE49B"><div class="step">300</div><div class="hex">#FDE49B</div></div>
      <div class="swatch light" style="background:#FDD768"><div class="step">400</div><div class="hex">#FDD768</div></div>
      <div class="swatch dark" style="background:#FCC936"><div class="step">500</div><div class="hex">#FCC936</div></div>
      <div class="swatch dark" style="background:#FBBC04"><div class="step">600</div><div class="hex">#FBBC04</div></div>
      <div class="swatch dark" style="background:#C99603"><div class="step">700</div><div class="hex">#C99603</div></div>
      <div class="swatch dark" style="background:#977102"><div class="step">800</div><div class="hex">#977102</div></div>
      <div class="swatch dark" style="background:#644B02"><div class="step">900</div><div class="hex">#644B02</div></div>
      <div class="swatch dark" style="background:#322601"><div class="step">1000</div><div class="hex">#322601</div></div>
    </div>
  </div>
</body>
</html>
