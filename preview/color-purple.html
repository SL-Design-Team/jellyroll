<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Color · SL Purple</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="card.css" />
</head>
<body>
  <div class="card">
    <div class="row-label">
      <span class="name">SL Purple</span>
      <span class="meta">--sl-purple-50 → --sl-purple-1000 · default Purple-600 #623684</span>
    </div>
    <div class="swatch-row" style="grid-template-columns: repeat(11, 1fr);">
      <div class="swatch light" style="background:#F7F5F9"><div class="step">50</div><div class="hex">#F7F5F9</div></div>
      <div class="swatch light" style="background:#EFEBF3"><div class="step">100</div><div class="hex">#EFEBF3</div></div>
      <div class="swatch light" style="background:#E0D7E6"><div class="step">200</div><div class="hex">#E0D7E6</div></div>
      <div class="swatch light" style="background:#C0AFCE"><div class="step">300</div><div class="hex">#C0AFCE</div></div>
      <div class="swatch light" style="background:#A186B5"><div class="step">400</div><div class="hex">#A186B5</div></div>
      <div class="swatch dark" style="background:#815E9D"><div class="step">500</div><div class="hex">#815E9D</div></div>
      <div class="swatch dark" style="background:#623684"><div class="step">600</div><div class="hex">#623684</div></div>
      <div class="swatch dark" style="background:#4E2B6A"><div class="step">700</div><div class="hex">#4E2B6A</div></div>
      <div class="swatch dark" style="background:#3B204F"><div class="step">800</div><div class="hex">#3B204F</div></div>
      <div class="swatch dark" style="background:#271635"><div class="step">900</div><div class="hex">#271635</div></div>
      <div class="swatch dark" style="background:#140B1A"><div class="step">1000</div><div class="hex">#140B1A</div></div>
    </div>
  </div>
</body>
</html>
