<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Color · SL Blue</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="card.css" />
</head>
<body>
  <div class="card">
    <div class="row-label">
      <span class="name">SL Blue</span>
      <span class="meta">--sl-blue-50 → --sl-blue-1000 · default Blue-600 #0841B4</span>
    </div>
    <div class="swatch-row" style="grid-template-columns: repeat(11, 1fr);">
      <div class="swatch light" style="background:#F2F6FC"><div class="step">50</div><div class="hex">#F2F6FC</div></div>
      <div class="swatch light" style="background:#E6ECF8"><div class="step">100</div><div class="hex">#E6ECF8</div></div>
      <div class="swatch light" style="background:#CED9F0"><div class="step">200</div><div class="hex">#CED9F0</div></div>
      <div class="swatch light" style="background:#9CB3E1"><div class="step">300</div><div class="hex">#9CB3E1</div></div>
      <div class="swatch light" style="background:#6B8DD2"><div class="step">400</div><div class="hex">#6B8DD2</div></div>
      <div class="swatch dark" style="background:#3967C3"><div class="step">500</div><div class="hex">#3967C3</div></div>
      <div class="swatch dark" style="background:#0841B4"><div class="step">600</div><div class="hex">#0841B4</div></div>
      <div class="swatch dark" style="background:#063490"><div class="step">700</div><div class="hex">#063490</div></div>
      <div class="swatch dark" style="background:#05276C"><div class="step">800</div><div class="hex">#05276C</div></div>
      <div class="swatch dark" style="background:#031A48"><div class="step">900</div><div class="hex">#031A48</div></div>
      <div class="swatch dark" style="background:#020D24"><div class="step">1000</div><div class="hex">#020D24</div></div>
    </div>
  </div>
</body>
</html>
