<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Components · Radio</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="card.css" />
<style>
  .grid { display: grid; grid-template-columns: 110px 1fr 1fr; gap: 10px 24px; align-items: center; }
  .tag { font: 800 10px/14px var(--font-sans); text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-text-subtle); }
  .opt { display: flex; align-items: center; gap: 8px; font: 400 14px/22px var(--font-sans); color: var(--sl-indigo-900); }
  .opt.disabled { color: var(--color-text-disabled); }
  .radio {
    width: 20px; height: 20px; border-radius: 999px;
    border: 1.5px solid var(--sl-grey-600);
    background: var(--sl-white);
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .radio.hover { border-color: var(--sl-blue-600); }
  .radio.focus { border-color: var(--sl-teal-600); box-shadow: 0 0 0 3px rgba(9,129,127,0.25); }
  .radio.selected { border-color: var(--sl-blue-600); }
  .radio.selected::after {
    content: ''; width: 10px; height: 10px; border-radius: 999px;
    background: var(--sl-blue-600);
  }
  .radio.disabled { border-color: var(--sl-grey-300); background: var(--sl-grey-100); }
  .radio.disabled.selected::after { background: var(--sl-grey-400); }
</style>
</head>
<body>
  <div class="card">
    <div class="row-label"><span class="name">Radio</span><span class="meta">20px control · 10px dot · 8px gap</span></div>
    <div class="grid">
      <div></div><span class="tag">Enabled</span><span class="tag">Disabled</span>
      <span class="tag">Unselected</span>
      <span class="opt"><span class="radio"></span>Label</span>
      <span class="opt disabled"><span class="radio disabled"></span>Label</span>
      <span class="tag">Hover</span>
      <span class="opt"><span class="radio hover"></span>Label</span>
      <span></span>
      <span class="tag">Selected</span>
      <span class="opt"><span class="radio selected"></span>Label</span>
      <span class="opt disabled"><span class="radio disabled selected"></span>Label</span>
      <span class="tag">Tab focus</span>
      <span class="opt"><span class="radio focus"></span>Label</span>
      <span></span>
    </div>
  </div>
</body>
</html>
