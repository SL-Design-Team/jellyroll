<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Color · SL Green</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="card.css" />
</head>
<body>
  <div class="card">
    <div class="row-label">
      <span class="name">SL Green</span>
      <span class="meta">--sl-green-50 → --sl-green-1000 · default Green-600 #017D1B</span>
    </div>
    <div class="swatch-row" style="grid-template-columns: repeat(11, 1fr);">
      <div class="swatch light" style="background:#F2F8F3"><div class="step">50</div><div class="hex">#F2F8F3</div></div>
      <div class="swatch light" style="background:#E6F2E8"><div class="step">100</div><div class="hex">#E6F2E8</div></div>
      <div class="swatch light" style="background:#CCE5D1"><div class="step">200</div><div class="hex">#CCE5D1</div></div>
      <div class="swatch light" style="background:#99CBA4"><div class="step">300</div><div class="hex">#99CBA4</div></div>
      <div class="swatch light" style="background:#67B176"><div class="step">400</div><div class="hex">#67B176</div></div>
      <div class="swatch dark" style="background:#349749"><div class="step">500</div><div class="hex">#349749</div></div>
      <div class="swatch dark" style="background:#017D1B"><div class="step">600</div><div class="hex">#017D1B</div></div>
      <div class="swatch dark" style="background:#016416"><div class="step">700</div><div class="hex">#016416</div></div>
      <div class="swatch dark" style="background:#014B10"><div class="step">800</div><div class="hex">#014B10</div></div>
      <div class="swatch dark" style="background:#00320B"><div class="step">900</div><div class="hex">#00320B</div></div>
      <div class="swatch dark" style="background:#001905"><div class="step">1000</div><div class="hex">#001905</div></div>
    </div>
  </div>
</body>
</html>
