<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Radius</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="card.css" />
<style>
  .radii { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
  .radius-tile { aspect-ratio: 1; background: var(--sl-blue-100); border: 1.5px solid var(--sl-blue-600); display:flex; flex-direction:column; align-items:center; justify-content:center; gap: 4px; color: var(--sl-blue-700); }
  .radius-tile .v { font-weight: 800; font-size: 16px; }
  .radius-tile .t { font-family: var(--font-mono); font-size: 11px; }
</style>
<script type="application/json" id="jellyroll-meta">
{
  "name": "Radius",
  "section": "Foundations",
  "url": "https://sl-design-team.github.io/jellyroll/preview/spacing-radius.html",
  "tagline": "Restrained corners: 2 / 4 / 6–8 / 999px.",
  "usage": "Use 2px for small inline elements (badges, chips), 4px as the default for cards and buttons, 6–8px for large surfaces and modals, and 999px for pill tags only. Never invent intermediate values.",
  "tokens": [
    "--radius-xs",
    "--radius-sm",
    "--radius-md",
    "--radius-lg",
    "--radius-pill"
  ]
}
</script>
</head>
<body>
  <div class="card">
    <div class="row-label"><span class="name">Corner radii</span><span class="meta">--radius-*</span></div>
    <div class="radii">
      <div class="radius-tile" style="border-radius: 2px;"><div class="v">2</div><div class="t">--xs</div></div>
      <div class="radius-tile" style="border-radius: 4px;"><div class="v">4</div><div class="t">--sm</div></div>
      <div class="radius-tile" style="border-radius: 6px;"><div class="v">6</div><div class="t">--md</div></div>
      <div class="radius-tile" style="border-radius: 8px;"><div class="v">8</div><div class="t">--lg</div></div>
      <div class="radius-tile" style="border-radius: 999px;"><div class="v">∞</div><div class="t">--pill</div></div>
    </div>
  </div>
</body>
</html>
