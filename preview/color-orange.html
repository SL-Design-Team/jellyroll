<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Color · SL Orange</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="card.css" />
</head>
<body>
  <div class="card">
    <div class="row-label">
      <span class="name">SL Orange</span>
      <span class="meta">--sl-orange-50 → --sl-orange-1000 · default Orange-600 #F9660B</span>
    </div>
    <div class="swatch-row" style="grid-template-columns: repeat(11, 1fr);">
      <div class="swatch light" style="background:#FEF7F3"><div class="step">50</div><div class="hex">#FEF7F3</div></div>
      <div class="swatch light" style="background:#FEF0E7"><div class="step">100</div><div class="hex">#FEF0E7</div></div>
      <div class="swatch light" style="background:#FEE0CE"><div class="step">200</div><div class="hex">#FEE0CE</div></div>
      <div class="swatch light" style="background:#FDC29D"><div class="step">300</div><div class="hex">#FDC29D</div></div>
      <div class="swatch light" style="background:#FBA36D"><div class="step">400</div><div class="hex">#FBA36D</div></div>
      <div class="swatch dark" style="background:#FA853C"><div class="step">500</div><div class="hex">#FA853C</div></div>
      <div class="swatch dark" style="background:#F9660B"><div class="step">600</div><div class="hex">#F9660B</div></div>
      <div class="swatch dark" style="background:#C75209"><div class="step">700</div><div class="hex">#C75209</div></div>
      <div class="swatch dark" style="background:#953D07"><div class="step">800</div><div class="hex">#953D07</div></div>
      <div class="swatch dark" style="background:#642904"><div class="step">900</div><div class="hex">#642904</div></div>
      <div class="swatch dark" style="background:#321402"><div class="step">1000</div><div class="hex">#321402</div></div>
    </div>
  </div>
</body>
</html>
