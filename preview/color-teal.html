<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Color · SL Teal</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="card.css" />
</head>
<body>
  <div class="card">
    <div class="row-label">
      <span class="name">SL Teal</span>
      <span class="meta">--sl-teal-50 → --sl-teal-1000 · default Teal-600 #09817F</span>
    </div>
    <div class="swatch-row" style="grid-template-columns: repeat(11, 1fr);">
      <div class="swatch light" style="background:#F2F8F8"><div class="step">50</div><div class="hex">#F2F8F8</div></div>
      <div class="swatch light" style="background:#E6F2F2"><div class="step">100</div><div class="hex">#E6F2F2</div></div>
      <div class="swatch light" style="background:#CEE6E5"><div class="step">200</div><div class="hex">#CEE6E5</div></div>
      <div class="swatch light" style="background:#9DCDCC"><div class="step">300</div><div class="hex">#9DCDCC</div></div>
      <div class="swatch light" style="background:#6BB3B2"><div class="step">400</div><div class="hex">#6BB3B2</div></div>
      <div class="swatch dark" style="background:#3A9A99"><div class="step">500</div><div class="hex">#3A9A99</div></div>
      <div class="swatch dark" style="background:#09817F"><div class="step">600</div><div class="hex">#09817F</div></div>
      <div class="swatch dark" style="background:#076766"><div class="step">700</div><div class="hex">#076766</div></div>
      <div class="swatch dark" style="background:#054D4C"><div class="step">800</div><div class="hex">#054D4C</div></div>
      <div class="swatch dark" style="background:#043433"><div class="step">900</div><div class="hex">#043433</div></div>
      <div class="swatch dark" style="background:#021A19"><div class="step">1000</div><div class="hex">#021A19</div></div>
    </div>
  </div>
</body>
</html>
