<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Components · Modal</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="card.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  .stage { background: var(--color-scrim); padding: 24px; border-radius: var(--radius-sm); display: flex; justify-content: center; }
  .modal { width: 480px; background: var(--sl-white); border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow-overlay-strong); }
  .mh { display:flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 12px; }
  .mt { font: 800 18px/26px var(--font-sans); color: var(--sl-indigo-900); flex: 1; }
  .mx {
    flex: none;
    width: 32px; height: 32px;
    margin: -4px -4px 0 0;
    display: inline-flex; align-items: center; justify-content: center;
    border: 0; background: transparent;
    border-radius: var(--radius-xs);
    color: var(--color-text-body);
    cursor: pointer;
    transition: background-color 150ms ease-out;
  }
  .mx:hover { background: var(--sl-grey-100); }
  .mx:focus-visible { outline: none; box-shadow: var(--ring-focus); }
  .mx svg { width: 20px; height: 20px; stroke-width: 2; }
  .mb { font: 400 14px/22px var(--font-sans); color: var(--sl-indigo-900); margin-bottom: 24px; }
  .mf { display:flex; justify-content: flex-end; gap: 8px; }
  .sl-btn { font: 800 14px/22px var(--font-sans); padding: 6px 18px; border-radius: var(--radius-sm); cursor: pointer; border: 1.5px solid transparent; }
  .sl-btn--secondary { background: var(--sl-white); color: var(--sl-blue-600); border-color: var(--sl-blue-600); }
  .sl-btn--primary { background: var(--sl-blue-600); color: var(--sl-white); }
</style>
<script type="application/json" id="jellyroll-meta">
{
  "name": "Modal",
  "section": "Composed components",
  "url": "https://sl-design-team.github.io/jellyroll/preview/components-modal.html",
  "tagline": "Overlay surface for confirms, focused tasks, and destructive actions.",
  "anatomy": "Scrim `rgba(9, 30, 66, 0.54)` · panel (white, 6–8px radius, `0 8px 24px rgba(38, 40, 44, 0.18)` shadow) · header (question or noun-title) · body (specific, quotes the object being acted on) · footer (right-aligned actions; primary on the right).",
  "options": "Sizes: small (confirm), medium (form), large (multi-step). With or without close `×` in the header.",
  "usage": "Use for confirms (destructive actions), short focused tasks, and content that requires the user's full attention. Do not use for navigation, casual previews, or anything that could live inline. The header is a question or noun-title; the body names the specific object being acted on.",
  "behaviors": "Esc dismisses (except in unsaved-changes flows). Click outside the panel dismisses unless the modal is confirming a destructive action. Focus traps inside the panel; on close, focus returns to the trigger. Animation: 200ms scrim fade + panel slide-up 8px.",
  "tokens": [
    "--color-scrim",
    "--color-surface-overlay",
    "--shadow-overlay",
    "--radius-lg",
    "--space-6"
  ]
}
</script>
</head>
<body>
  <div class="card">
    <div class="row-label"><span class="name">Modal</span><span class="meta">scrim 9/30/66 @ 54% · 24px padding</span></div>
    <div class="stage">
      <div class="modal">
        <div class="mh">
          <div class="mt">Are you sure you want to delete this pipeline?</div>
          <button class="mx" aria-label="Close"><i data-lucide="x"></i></button>
        </div>
        <div class="mb">"MG-pipeline-Nov2022" will be moved to the Recycle Bin and deleted forever after 30 days. Pipelines do not run while they are in the Recycle Bin.</div>
        <div class="mf">
          <button class="sl-btn sl-btn--secondary">Cancel</button>
          <button class="sl-btn sl-btn--primary">Delete</button>
        </div>
      </div>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
