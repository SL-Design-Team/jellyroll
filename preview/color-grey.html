<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Color · SL Grey</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="card.css" />
</head>
<body>
  <div class="card">
    <div class="row-label">
      <span class="name">SL Grey</span>
      <span class="meta">--sl-grey-50 → --sl-grey-1000 · default Grey-600 #9CA7BA</span>
    </div>
    <div class="swatch-row" style="grid-template-columns: repeat(11, 1fr);">
      <div class="swatch light" style="background:#FAFAFB"><div class="step">50</div><div class="hex">#FAFAFB</div></div>
      <div class="swatch light" style="background:#F5F6F8"><div class="step">100</div><div class="hex">#F5F6F8</div></div>
      <div class="swatch light" style="background:#EBEDF1"><div class="step">200</div><div class="hex">#EBEDF1</div></div>
      <div class="swatch light" style="background:#D7DCE3"><div class="step">300</div><div class="hex">#D7DCE3</div></div>
      <div class="swatch light" style="background:#C4CAD6"><div class="step">400</div><div class="hex">#C4CAD6</div></div>
      <div class="swatch dark" style="background:#B0B9C8"><div class="step">500</div><div class="hex">#B0B9C8</div></div>
      <div class="swatch dark" style="background:#9CA7BA"><div class="step">600</div><div class="hex">#9CA7BA</div></div>
      <div class="swatch dark" style="background:#7D8695"><div class="step">700</div><div class="hex">#7D8695</div></div>
      <div class="swatch dark" style="background:#5E6470"><div class="step">800</div><div class="hex">#5E6470</div></div>
      <div class="swatch dark" style="background:#3E434A"><div class="step">900</div><div class="hex">#3E434A</div></div>
      <div class="swatch dark" style="background:#1F2125"><div class="step">1000</div><div class="hex">#1F2125</div></div>
    </div>
  </div>
</body>
</html>
