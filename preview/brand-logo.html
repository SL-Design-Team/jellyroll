<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Brand · Logo</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="card.css" />
<style>
  .stage { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .panel { padding: 32px; border-radius: var(--radius-sm); display:flex; align-items:center; justify-content:center; min-height: 140px; }
  .panel.dark { background: var(--sl-blue-900); }
  .panel.light { background: var(--sl-grey-100); border: 1px solid var(--sl-grey-300); }
  .panel img { height: 40px; }
  .meta { text-align:center; font-size: 10px; color: var(--color-text-subtle); font-family: var(--font-mono); margin-top: 6px; }
</style>
</head>
<body>
  <div class="card">
    <div class="row-label"><span class="name">Wordmark</span><span class="meta">snapLogic® on dark · inverted variant on light</span></div>
    <div class="stage">
      <div>
        <div class="panel dark"><img src="../assets/logo-white.png" alt="SnapLogic" /></div>
        <div class="meta">on indigo-1000</div>
      </div>
      <div>
        <div class="panel light"><img src="../assets/logo-white.png" alt="SnapLogic" style="filter: invert(1) brightness(0.2);" /></div>
        <div class="meta">on grey-100 (inverted)</div>
      </div>
    </div>
  </div>
</body>
</html>
