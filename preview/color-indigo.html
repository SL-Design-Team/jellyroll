<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Color · SL Indigo</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="card.css" />
</head>
<body>
  <div class="card">
    <div class="row-label">
      <span class="name">SL Indigo</span>
      <span class="meta">--sl-indigo-50 → --sl-indigo-1000 · default Indigo-600 #304684</span>
    </div>
    <div class="swatch-row" style="grid-template-columns: repeat(11, 1fr);">
      <div class="swatch light" style="background:#F4F6F9"><div class="step">50</div><div class="hex">#F4F6F9</div></div>
      <div class="swatch light" style="background:#EAEDF3"><div class="step">100</div><div class="hex">#EAEDF3</div></div>
      <div class="swatch light" style="background:#D6DAE6"><div class="step">200</div><div class="hex">#D6DAE6</div></div>
      <div class="swatch light" style="background:#ACB5CE"><div class="step">300</div><div class="hex">#ACB5CE</div></div>
      <div class="swatch light" style="background:#8390B5"><div class="step">400</div><div class="hex">#8390B5</div></div>
      <div class="swatch dark" style="background:#596B9D"><div class="step">500</div><div class="hex">#596B9D</div></div>
      <div class="swatch dark" style="background:#304684"><div class="step">600</div><div class="hex">#304684</div></div>
      <div class="swatch dark" style="background:#26386A"><div class="step">700</div><div class="hex">#26386A</div></div>
      <div class="swatch dark" style="background:#1D2A4F"><div class="step">800</div><div class="hex">#1D2A4F</div></div>
      <div class="swatch dark" style="background:#131C35"><div class="step">900</div><div class="hex">#131C35</div></div>
      <div class="swatch dark" style="background:#0A0E1A"><div class="step">1000</div><div class="hex">#0A0E1A</div></div>
    </div>
  </div>
</body>
</html>
