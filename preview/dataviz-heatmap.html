  .card { width: 100%; gap: 14px; padding: 24px; background: var(--sl-grey-100); }

  .demo .lbl { font: 800 10px/14px var(--font-sans); color: var(--color-text-subtle); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }

  .axis-text { font: 400 10px/12px ui-monospace, Menlo, monospace; fill: #7D8695; }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 12px; }

  .panel { padding: 20px 22px; background: var(--sl-white); border: 1px solid var(--sl-grey-300); border-radius: var(--radius-sm); }
  .panel .t { font: 800 14px/18px var(--font-sans); color: var(--sl-indigo-900); margin-bottom: 4px; }
  .panel .sub { font: 400 12px/16px var(--font-sans); color: var(--color-text-subtle); margin-bottom: 14px; }
  .legend-scale { display: flex; align-items: center; gap: 8px; font: 400 11px/14px var(--font-sans); color: var(--color-text-subtle); margin-top: 16px; }
  .scale-row { display: grid; grid-template-columns: repeat(5, 18px); gap: 2px; }
  .scale-row .sw { width: 18px; height: 18px; border-radius: 2px; }
</style>
